name: Deploy to Firebase

on:
  push:
    branches:
      - main
  pull_request:      # <--- ADD THIS
    branches:        # <--- ADD THIS
      - main         # <--- ADD THIS

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      # 🚨 THIS IS YOUR PROFESSOR'S REQUIREMENT: The Automatic Test
      - name: 🧪 Run Automatic Tests
        run: node test.js
        
      # 🚀 This only runs if the test above passes!
      - name: ☁️ Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: sinekultura-web-87ee8
          channelId: live