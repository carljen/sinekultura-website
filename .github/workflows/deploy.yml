name: Deploy to Firebase

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 🚨 ADD THIS NEW BLOCK 🚨
permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      # 🚨 THIS IS YOUR PROFESSOR'S REQUIREMENT: The Automatic Test
      - name: 🧪 Run Automatic Tests
        run: node test.js
        
      # 1. This ONLY runs during a Pull Request (Creates a temporary preview URL)
      - name: ☁️ Deploy Preview (For Pull Requests)
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: sinekultura-web-87ee8
          # Notice we removed the channelId here so Firebase makes a temporary one!

      # 2. This ONLY runs when code is pushed or merged into Main (Updates the live site)
      - name: ☁️ Deploy Live (For Merges to Main)
        if: github.event_name == 'push'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: sinekultura-web-87ee8
          channelId: live