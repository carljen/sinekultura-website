<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restricted Access | Sine Kultura</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .login-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 10;
            position: relative;
        }
        .login-box {
            background: var(--surface-color);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            transition: transform 0.2s ease;
        }
        .login-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            /* Removed the gold border here */
            margin-bottom: 20px;
            object-fit: cover;
        }
        .error-text {
            color: #ff4c4c;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-wrapper fade-in">
        <img src="assets/media/logo.png" alt="Sine Kultura Logo" class="login-logo">
        
        <div class="login-box">
            <h2 style="color: var(--text-main); margin-bottom: 25px;">Executive Login</h2>
            
            <div id="login-form" class="admin-form">
                <input type="text" id="username" placeholder="Username" required style="width: 100%;">
                <input type="password" id="password" placeholder="Password" required style="width: 100%;">
                <button type="button" onclick="handleLogin()" class="primary-btn" style="width: 100%; margin-top: 15px;">Authenticate</button>
                <p id="error-msg" class="error-text">Invalid username or password.</p>
            </div>

            <a href="index.html" style="color: var(--text-muted); font-size: 0.85rem; display: block; margin-top: 25px; text-decoration: none; transition: 0.3s;">
                <i class="fa-solid fa-arrow-left"></i> Return to Public Site
            </a>
        </div>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            if (user === 'admin' && pass === 'admin') {
                sessionStorage.setItem('sine_admin_auth', 'true');
                window.location.href = 'admin.html';
            } else {
                errorMsg.style.display = 'block';
                
                const box = document.querySelector('.login-box');
                box.style.transform = 'translateX(10px)';
                setTimeout(() => box.style.transform = 'translateX(-10px)', 100);
                setTimeout(() => box.style.transform = 'translateX(0)', 200);
            }
        }

        // Allow pressing 'Enter' to submit
        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
